name: Autonomous AI Testing Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-qa:
    runs-on: ubuntu-latest
    name: Run AI QA Agent

    permissions:
      pull-requests: write # post PR comment
      contents: write # commit report back to the branch
      checks: write # create check runs via API

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetch the actual PR branch so we can commit the report back
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Start the target application as a background service.
      # -----------------------------------------------------------------------
      - name: Start Target Application
        run: |
          python -m http.server 8080 --directory app &
          echo "Waiting for target app to be ready..."
          curl --silent --fail --retry 10 --retry-delay 1 --retry-all-errors \
            http://localhost:8080/ > /dev/null
          echo "Target app is ready at http://localhost:8080"

      # -----------------------------------------------------------------------
      # Build the agent Docker image
      # -----------------------------------------------------------------------
      - name: Build Agent Docker Image
        run: docker build -t ai-testing-agent .

      # -----------------------------------------------------------------------
      # Shared workspace for test artifacts
      # -----------------------------------------------------------------------
      - name: Prepare Workspace
        run: mkdir -p $GITHUB_WORKSPACE/agent-workspace

      # -----------------------------------------------------------------------
      # Run the agent inside Docker.
      # -----------------------------------------------------------------------
      - name: Execute AI Testing Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          TARGET_URL: "http://localhost:8080"
        run: |
          docker run --network host \
            -v $GITHUB_WORKSPACE/agent-workspace:/workspace \
            -e GROQ_API_KEY=$GROQ_API_KEY \
            -e GITHUB_TOKEN=$GITHUB_TOKEN \
            -e GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
            -e WORKSPACE_DIR=/workspace \
            ai-testing-agent \
            $PR_NUMBER "$PR_BODY" "$TARGET_URL"

      # -----------------------------------------------------------------------
      # Commit the generated HTML report back into the repository so it is
      # permanently linked to this PR and visible without downloading artifacts.
      # The [skip ci] suffix prevents an infinite Actions loop.
      # -----------------------------------------------------------------------
      - name: Save Report to artifact-generated-for-test-PR/
        if: always()
        run: |
          REPORT_SRC="$GITHUB_WORKSPACE/agent-workspace/report.html"
          REPORT_DEST="artifact-generated-for-test-PR/report-pr-${{ github.event.pull_request.number }}.html"

          if [ ! -f "$REPORT_SRC" ]; then
            echo "No report found at $REPORT_SRC — skipping commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p artifact-generated-for-test-PR
          cp "$REPORT_SRC" "$REPORT_DEST"
          git add artifact-generated-for-test-PR/

          # Only commit if there is something new
          git diff --staged --quiet || \
            git commit -m "ci: add AI test report for PR #${{ github.event.pull_request.number }} [skip ci]"
          git push origin ${{ github.head_ref }}

          # Manually create a Check Run on the new commit so the PR UI shows the status
          NEW_SHA=$(git rev-parse HEAD)
          if [ "${{ job.status }}" == "success" ]; then
            CONCLUSION="success"
          else
            CONCLUSION="failure"
          fi

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/check-runs \
            -d "{\"name\": \"Autonomous AI Testing Agent\", \"head_sha\": \"$NEW_SHA\", \"status\": \"completed\", \"conclusion\": \"$CONCLUSION\"}"

      # -----------------------------------------------------------------------
      # Also upload the report as a downloadable Actions artifact (14-day retention).
      # Named with the PR number for clear identification.
      # -----------------------------------------------------------------------
      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-report-pr-${{ github.event.pull_request.number }}
          path: ${{ github.workspace }}/agent-workspace/report.html
          retention-days: 14
